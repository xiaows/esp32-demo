<!DOCTYPE html>
<html>
<head>
    <title>ESP32 无线编程器</title>
    <meta charset="utf-8">
    <style>

            left: 50%;

            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100%; height: 100%;
            pointer-events: none;

            content: '';

            background: rgba(255,255,255,0.08);

            width: 1px; height: 80%;
            top: 10%; left: 50%;

            top: 50%; left: 10%;

<body>
    <div class="container">
        <div class="header">
            <h1>📡 ESP32 无线编程器</h1>
            <p>通过蓝牙或USB给ESP32发送并执行Python代码</p>
        </div>
        
        <div class="content">
            <div class="editor-section">
                <div class="tab-container">
                    <div class="tab active" onclick="switchTab('editor')">代码编辑器</div>
                    <div class="tab" onclick="switchTab('terminal')">终端输出</div>
                </div>
                
                <div id="editorTab" class="editor-container">
                    <textarea id="codeEditor" style="width: 100%; height: 100%; background: #1e1e1e; color: #d4d4d4; font-family: 'Consolas', monospace; font-size: 14px; padding: 15px; border: none; resize: none; outline: none;">

from machine import Pin
import time

led = Pin(2, Pin.OUT)

while not should_stop():
    print("已运行")
    led.value(not led.value())
    time.sleep(0.5)

led.value(0)
print("已停止")</textarea>
                </div>

                    <div class="log-container" id="terminalOutput"></div>
                </div>

                    </span>

                    🔴 未连接到 ESP32

    <script>
        // BLE配置 (Web Bluetooth 要求 UUID 必须小写)
        const SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const RX_CHARACTERISTIC_UUID = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
        const TX_CHARACTERISTIC_UUID = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';
        const CODE_CHARACTERISTIC_UUID = '6e400004-b5a3-f393-e0a9-e50e24dcca9e';
        
        // 全局变量
        let device = null;
        let server = null;
        let service = null;
        let rxCharacteristic = null;  // 发送命令
        let txCharacteristic = null;  // 接收响应
        let codeCharacteristic = null; // 大文件传输
        let isConnected = false;

        // USB串口相关变量
        let usbPort = null;
        let usbReader = null;
        let usbWriter = null;
        let usbReadableStreamClosed = null;
        let usbWritableStreamClosed = null;
        let usbKeepReading = false;
        let connectionType = 'ble';  // 'ble' 或 'usb'

        // 命令计时
        let commandStartTime = null;   // 当前命令发送时间
        let commandType = null;        // 当前命令类型

        // 编辑器引用
        const editor = document.getElementById('codeEditor');

        // 监听光标位置变化
        editor.addEventListener('click', updateCursorPosition);
        editor.addEventListener('keyup', updateCursorPosition);

        function updateCursorPosition() {
            const text = editor.value.substring(0, editor.selectionStart);
            const lines = text.split('\n');
            document.getElementById('lineNumber').textContent = lines.length;
            document.getElementById('columnNumber').textContent = lines[lines.length - 1].length + 1;
        }
        
        // 标签切换
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.getElementById('editorTab').style.display = 'none';
            document.getElementById('terminalTab').style.display = 'none';
            
            if (tabName === 'editor') {
                document.querySelector('.tab:nth-child(1)').classList.add('active');
                document.getElementById('editorTab').style.display = 'block';
            } else {
                document.querySelector('.tab:nth-child(2)').classList.add('active');
                document.getElementById('terminalTab').style.display = 'block';
            }
        }
        
        // 连接设备
        async function connectDevice() {
            // 获取选择的连接类型
            connectionType = document.querySelector('input[name="connType"]:checked').value;

            if (connectionType === 'usb') {
                await connectUSB();
            } else {
                await connectBLE();
            }
        }

        // USB串口连接
        async function connectUSB() {
            try {
                if (!('serial' in navigator)) {
                    logMessage('错误：浏览器不支持Web Serial API，请使用Chrome/Edge浏览器', 'error');
                    return;
                }

                logMessage('正在选择串口设备...', 'info');

                usbPort = await navigator.serial.requestPort();
                await usbPort.open({ baudRate: 115200 });

                logMessage('USB串口已连接', 'success');

                // 设置读取器（使用更简单的方式）
                usbKeepReading = true;
                usbReader = usbPort.readable.getReader();
                usbWriter = usbPort.writable.getWriter();

                isConnected = true;
                updateConnectionStatus(true, 'USB');
                enableControls(true);

                // 开始读取串口数据
                readUSBData();

            } catch (error) {
                logMessage(`USB连接失败: ${error.message}`, 'error');
                updateConnectionStatus(false);
            }
        }

        // 读取USB串口数据
        async function readUSBData() {
            const decoder = new TextDecoder();
            let buffer = '';

            try {
                while (usbKeepReading && usbReader) {
                    const { value, done } = await usbReader.read();
                    if (done) {
                        break;
                    }

                    buffer += decoder.decode(value, { stream: true });

                    // 处理完整的行
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        processUSBLine(line.trim());
                    }
                }
            } catch (error) {
                if (usbKeepReading && isConnected) {
                    logMessage(`USB读取错误: ${error.message}`, 'error');
                }
            }
        }

        // 处理USB串口接收的数据行
        function processUSBLine(line) {
            if (!line) return;

            // 检查是否是JSON响应
            if (line.startsWith('USB_RESP:')) {
                try {
                    const jsonStr = line.substring(9);
                    const response = JSON.parse(jsonStr);
                    processResponse(response);
                } catch (e) {
                    logMessage(`接收数据: ${line}`, 'info');
                }
            } else {
                // 普通输出
                logMessage(`ESP32: ${line}`, 'info');
            }
        }

        // 通过USB发送命令
        async function sendUSBCommand(command) {
            if (!isConnected || !usbWriter) {
                logMessage('错误：USB未连接', 'error');
                return;
            }

            try {
                const encoder = new TextEncoder();
                const commandStr = JSON.stringify(command) + '\n';

                // 记录发送时间
                commandStartTime = performance.now();
                commandType = command.type;

                await usbWriter.write(encoder.encode(commandStr));
                logMessage(`发送USB命令: ${command.type}`, 'info');
            } catch (error) {
                logMessage(`USB发送失败: ${error.message}`, 'error');
            }
        }

        // 通过USB发送大文件数据（Base64编码，同步模式）
        async function sendUSBFileData(data) {
            if (!isConnected || !usbWriter) {
                throw new Error('USB未连接');
            }

            const encoder = new TextEncoder();
            const dataEncoder = new TextEncoder();
            const buffer = dataEncoder.encode(data);

            // USB模式：更小的分块 + 等待确认
            const chunkSize = 128;  // 减小分块大小，提高可靠性
            const totalChunks = Math.ceil(buffer.length / chunkSize);

            for (let i = 0; i < buffer.length; i += chunkSize) {
                const chunk = buffer.slice(i, i + chunkSize);
                const base64 = btoa(String.fromCharCode.apply(null, chunk));

                await usbWriter.write(encoder.encode('DATA:' + base64 + '\n'));

                const progress = Math.min((i + chunk.length) / buffer.length * 100, 100);
                updateProgress(progress);

                // 等待更长时间让ESP32处理
                await new Promise(resolve => setTimeout(resolve, 50));
            }

            // 发送结束标记
            await usbWriter.write(encoder.encode('END\n'));
        }

        // BLE连接
        async function connectBLE() {
            try {
                logMessage('正在扫描ESP32设备...', 'info');

                device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'ESP32-CodeLoader' }],
                    optionalServices: [SERVICE_UUID]
                });

                logMessage(`找到设备: ${device.name || device.id}`, 'success');

                // 连接GATT服务器
                logMessage('正在连接...', 'info');
                server = await device.gatt.connect();

                // 获取服务
                service = await server.getPrimaryService(SERVICE_UUID);

                // 获取特征
                rxCharacteristic = await service.getCharacteristic(RX_CHARACTERISTIC_UUID);
                txCharacteristic = await service.getCharacteristic(TX_CHARACTERISTIC_UUID);
                codeCharacteristic = await service.getCharacteristic(CODE_CHARACTERISTIC_UUID);

                // 监听通知
                await txCharacteristic.startNotifications();
                txCharacteristic.addEventListener('characteristicvaluechanged', handleResponse);

                // 更新连接状态
                isConnected = true;
                updateConnectionStatus(true, 'BLE');

                logMessage('连接成功！', 'success');

                // 启用控制按钮
                enableControls(true);

                // 监听断开事件
                device.addEventListener('gattserverdisconnected', onDisconnected);

            } catch (error) {
                logMessage(`连接失败: ${error.message}`, 'error');
                updateConnectionStatus(false);
            }
        }
        
        // 断开连接
        async function disconnectDevice() {
            if (connectionType === 'usb') {
                await disconnectUSB();
            } else {
                await disconnectBLE();
            }
        }

        // 断开USB连接
        async function disconnectUSB() {
            usbKeepReading = false;  // 先停止读取循环

            try {
                if (usbReader) {
                    await usbReader.cancel();  // 取消读取
                    usbReader.releaseLock();   // 释放锁
                    usbReader = null;
                }
                if (usbWriter) {
                    usbWriter.releaseLock();   // 释放锁
                    usbWriter = null;
                }
                if (usbPort) {
                    await usbPort.close();
                    usbPort = null;
                }
                logMessage('USB已断开', 'info');
            } catch (error) {
                logMessage(`USB断开: ${error.message}`, 'info');
            }
            onDisconnected();
        }

        // 断开BLE连接
        async function disconnectBLE() {
            if (device && device.gatt.connected) {
                try {
                    await device.gatt.disconnect();
                    logMessage('已断开连接', 'info');
                } catch (error) {
                    logMessage(`断开连接失败: ${error.message}`, 'error');
                }
            }
            onDisconnected();
        }
        
        // 断开处理
        function onDisconnected() {
            isConnected = false;
            usbKeepReading = false;
            device = null;
            server = null;
            service = null;
            rxCharacteristic = null;
            txCharacteristic = null;
            codeCharacteristic = null;
            usbPort = null;
            usbReader = null;
            usbWriter = null;

            updateConnectionStatus(false);
            enableControls(false);
            logMessage('设备已断开', 'error');
        }

        // 发送命令到ESP32
        async function sendCommand(command) {
            if (connectionType === 'usb') {
                return await sendUSBCommand(command);
            }

            if (!isConnected || !rxCharacteristic) {
                logMessage('错误：未连接到设备', 'error');
                return null;
            }

            try {
                const commandStr = JSON.stringify(command);
                const encoder = new TextEncoder();
                const data = encoder.encode(commandStr);

                // 记录发送时间
                commandStartTime = performance.now();
                commandType = command.type;

                await rxCharacteristic.writeValue(data);
                logMessage(`发送命令: ${command.type}`, 'info');

            } catch (error) {
                logMessage(`发送失败: ${error.message}`, 'error');
                return null;
            }
        }

        // 发送大文件数据
        async function sendFileData(data) {
            if (connectionType === 'usb') {
                return await sendUSBFileData(data);
            }

            if (!isConnected || !codeCharacteristic) {
                throw new Error('未连接到设备');
            }

            const encoder = new TextEncoder();
            const buffer = encoder.encode(data);

            // 分块发送（避免MTU限制）
            const chunkSize = 512; // BLE MTU通常为512字节
            for (let i = 0; i < buffer.length; i += chunkSize) {
                const chunk = buffer.slice(i, i + chunkSize);
                await codeCharacteristic.writeValue(chunk);

                // 更新进度
                const progress = Math.min((i + chunk.length) / buffer.length * 100, 100);
                updateProgress(progress);

                // 稍微延迟，避免阻塞
                await new Promise(resolve => setTimeout(resolve, 10));
            }
        }
        
        // 处理ESP32响应
        function handleResponse(event) {
            const value = event.target.value;
            const decoder = new TextDecoder('utf-8');
            const dataStr = decoder.decode(value);
            
            try {
                const response = JSON.parse(dataStr.trim());
                processResponse(response);
            } catch (error) {
                logMessage(`接收数据: ${dataStr}`, 'info');
            }
        }
        
        // 处理响应
        function processResponse(response) {
            const status = response.status;
            const message = response.message;
            const data = response.data;

            // 计算耗时
            let elapsed = '';
            const isTerminal = ['SUCCESS', 'ERROR'].includes(status);
            if (commandStartTime && isTerminal) {
                const duration = performance.now() - commandStartTime;
                elapsed = ` [耗时: ${duration.toFixed(1)}ms]`;
                commandStartTime = null;
            }

            switch (status) {
                case 'CONNECTED':
                    logMessage(message, 'success');
                    break;

                case 'SUCCESS':
                    logMessage(`✓ ${message}${elapsed}`, 'success');
                    if (data && data.files) {
                        displayFileList(data.files);
                    }
                    if (data && data.result) {
                        displayExecutionResult(data.result);
                    }
                    // 如果是临时文件上传完成，自动执行
                    if (data && data.filename === '_temp_run.py' && window.pendingRunAfterUpload) {
                        window.pendingRunAfterUpload = false;
                        logMessage('临时文件已保存，开始执行...', 'info');
                        setTimeout(async () => {
                            await sendCommand({
                                type: 'run',
                                filename: '_temp_run.py'
                            });
                        }, 100);
                    }
                    break;

                case 'ERROR':
                    logMessage(`✗ ${message}${elapsed}`, 'error');
                    break;

                case 'INFO':
                    logMessage(`ℹ ${message}`, 'info');
                    break;

                case 'OUTPUT':
                    // 代码执行的print输出，显示在终端
                    logOutput(message);
                    break;

                case 'READY':
                    logMessage(`准备接收文件: ${data.filename}`, 'info');
                    startFileUpload(data.filename);
                    break;

                case 'READY_RUN':
                    logMessage('准备发送代码执行...', 'info');
                    startCodeRun();
                    break;

                case 'PROGRESS':
                    updateProgress(data.progress);
                    break;

                default:
                    logMessage(`未知响应: ${status} - ${message}`, 'info');
            }
        }

        // ========== 方向控制器 (延迟测试) ==========
        let dpadLatencies = [];        // 历史延迟记录
        let dpadPendingTime = null;    // 当前按下时间戳
        let dpadPendingDir = null;     // 当前方向

        function dpadDown(btn, e) {
            e.preventDefault();
            btn.classList.add('active');
            const dir = btn.dataset.dir;

            if (!isConnected) {
                logMessage('方向控制：未连接设备', 'error');
                return;
            }

            dpadPendingDir = dir;
            dpadPendingTime = performance.now();

            // 发送方向指令，ESP32 侧执行对应代码并返回响应
            sendCommand({
                type: `${dir}`,
                code: `print("DPAD:${dir}:${Date.now()}")`
            });

            logMessage(`方向: ${dir}`, 'info');
        }

        function dpadUp(btn, e) {
            e.preventDefault();
            btn.classList.remove('active');
        }

        // 拦截响应，计算方向控制器延迟
        const _originalProcessResponse = processResponse;
        processResponse = function(response) {
            // 检测方向控制器的响应
            if (dpadPendingTime && response.status === 'SUCCESS') {
                const rtt = performance.now() - dpadPendingTime;
                dpadPendingTime = null;
                updateLatencyDisplay(rtt);
            }
            // 检测 OUTPUT 中的 DPAD 标记
            if (dpadPendingTime && response.status === 'OUTPUT' &&
                response.message && response.message.startsWith('DPAD:')) {
                const rtt = performance.now() - dpadPendingTime;
                dpadPendingTime = null;
                updateLatencyDisplay(rtt);
            }
            _originalProcessResponse(response);
        };

        function updateLatencyDisplay(rtt) {
            dpadLatencies.push(rtt);
            // 只保留最近 50 条
            if (dpadLatencies.length > 50) dpadLatencies.shift();

            const min = Math.min(...dpadLatencies);
            const max = Math.max(...dpadLatencies);
            const avg = dpadLatencies.reduce((a, b) => a + b, 0) / dpadLatencies.length;

            // 根据延迟着色
            const valueEl = document.getElementById('latencyValue');
            valueEl.textContent = rtt.toFixed(1) + ' ms';
            if (rtt < 100) {
                valueEl.style.color = '#2ecc71';       // 绿 - 优秀
            } else if (rtt < 300) {
                valueEl.style.color = '#f39c12';       // 橙 - 一般
            } else {
                valueEl.style.color = '#e74c3c';       // 红 - 较慢
            }

            document.getElementById('latencyMin').textContent = min.toFixed(1) + 'ms';
            document.getElementById('latencyAvg').textContent = avg.toFixed(1) + 'ms';
            document.getElementById('latencyMax').textContent = max.toFixed(1) + 'ms';
        }

        // 键盘方向键支持
        document.addEventListener('keydown', function(e) {
            const keyMap = {
                'ArrowUp': 'up', 'ArrowDown': 'down',
                'ArrowLeft': 'left', 'ArrowRight': 'right',
                'Enter': 'center', ' ': 'center'
            };
            const dir = keyMap[e.key];
            if (!dir) return;
            // 编辑器聚焦时不拦截
            if (document.activeElement === editor) return;
            e.preventDefault();
            const btn = document.querySelector(`.dpad-btn[data-dir="${dir}"]`);
            if (btn && !btn.classList.contains('active')) {
                dpadDown(btn, e);
            }
        });

        document.addEventListener('keyup', function(e) {
            const keyMap = {
                'ArrowUp': 'up', 'ArrowDown': 'down',
                'ArrowLeft': 'left', 'ArrowRight': 'right',
                'Enter': 'center', ' ': 'center'
            };
            const dir = keyMap[e.key];
            if (!dir) return;
            if (document.activeElement === editor) return;
            const btn = document.querySelector(`.dpad-btn[data-dir="${dir}"]`);
            if (btn) dpadUp(btn, e);
        });

        // ========== 摇杆控制器 ==========
        (function() {
            const area = document.getElementById('joystickArea');
            const thumb = document.getElementById('joystickThumb');
            const xSpan = document.getElementById('jsX');
            const ySpan = document.getElementById('jsY');
            const dirLabel = document.getElementById('jsDirLabel');

            let dragging = false;
            let areaRect = null;
            let radius = 0;
            let centerX = 0;
            let centerY = 0;
            let sendTimer = null;
            let lastSentDir = null;
            let jsPendingTime = null;

            function getDirection(nx, ny) {
                // nx, ny 范围 -1 ~ 1
                const deadzone = 0.25;
                if (Math.abs(nx) < deadzone && Math.abs(ny) < deadzone) return '居中';
                const angle = Math.atan2(-ny, nx) * 180 / Math.PI; // 上为正Y
                if (angle >= -22.5 && angle < 22.5) return 'right';
                if (angle >= 22.5 && angle < 67.5) return 'up-right';
                if (angle >= 67.5 && angle < 112.5) return 'up';
                if (angle >= 112.5 && angle < 157.5) return 'up-left';
                if (angle >= 157.5 || angle < -157.5) return 'left';
                if (angle >= -157.5 && angle < -112.5) return 'down-left';
                if (angle >= -112.5 && angle < -67.5) return 'down';
                if (angle >= -67.5 && angle < -22.5) return 'down-right';
                return '居中';
            }

            const dirNames = {
                '居中': '居中', 'up': '上', 'down': '下', 'left': '左', 'right': '右',
                'up-left': '左上', 'up-right': '右上', 'down-left': '左下', 'down-right': '右下'
            };

            function updateThumb(clientX, clientY) {
                let dx = clientX - centerX;
                let dy = clientY - centerY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const maxR = radius - 28; // thumb半径

                if (dist > maxR) {
                    dx = dx / dist * maxR;
                    dy = dy / dist * maxR;
                }

                thumb.style.left = (radius + dx) + 'px';
                thumb.style.top = (radius + dy) + 'px';
                thumb.style.transform = 'translate(-50%, -50%)';

                // 归一化坐标 -100 ~ 100
                const nx = Math.round(dx / maxR * 100);
                const ny = Math.round(-dy / maxR * 100); // Y轴反转，上为正

                xSpan.textContent = nx;
                ySpan.textContent = ny;

                const dir = getDirection(nx / 100, ny / 100);
                dirLabel.textContent = dirNames[dir] || dir;

                return { nx, ny, dir };
            }

            function sendJoystickCommand(nx, ny, dir) {
                if (!isConnected) return;
                if (dir === '居中') return;
                // 节流：方向不变时不重复发送
                if (dir === lastSentDir) return;
                lastSentDir = dir;

                jsPendingTime = performance.now();
                sendCommand({
                    type: 'joystick',
                    code: `print("JOY:${dir}:${nx}:${ny}")`
                });
                logMessage(`摇杆: ${dirNames[dir] || dir} (${nx}, ${ny})`, 'info');
            }

            function startDrag(e) {
                e.preventDefault();
                dragging = true;
                thumb.classList.add('dragging');
                areaRect = area.getBoundingClientRect();
                radius = areaRect.width / 2;
                centerX = areaRect.left + radius;
                centerY = areaRect.top + radius;

                const point = e.touches ? e.touches[0] : e;
                const result = updateThumb(point.clientX, point.clientY);

                // 持续发送定时器（每150ms检测一次方向变化）
                sendTimer = setInterval(() => {
                    if (!dragging) return;
                    const dir = dirLabel.textContent;
                    const nx = parseInt(xSpan.textContent);
                    const ny = parseInt(ySpan.textContent);
                    const dirKey = getDirection(nx / 100, ny / 100);
                    sendJoystickCommand(nx, ny, dirKey);
                }, 150);
            }

            function moveDrag(e) {
                if (!dragging) return;
                e.preventDefault();
                const point = e.touches ? e.touches[0] : e;
                updateThumb(point.clientX, point.clientY);
            }

            function endDrag(e) {
                if (!dragging) return;
                dragging = false;
                thumb.classList.remove('dragging');
                lastSentDir = null;

                if (sendTimer) {
                    clearInterval(sendTimer);
                    sendTimer = null;
                }

                // 回弹到中心
                thumb.style.left = '50%';
                thumb.style.top = '50%';
                thumb.style.transform = 'translate(-50%, -50%)';
                xSpan.textContent = '0';
                ySpan.textContent = '0';
                dirLabel.textContent = '居中';

                // 发送居中/释放指令
                if (isConnected) {
                    jsPendingTime = performance.now();
                    sendCommand({
                        type: 'run',
                        code: 'print("JOY:center:0:0")'
                    });
                }
            }

            // 同时拦截摇杆的延迟（复用 D-pad 的延迟面板）
            const _prevProcessResponse = processResponse;
            processResponse = function(response) {
                if (jsPendingTime && response.status === 'OUTPUT' &&
                    response.message && response.message.startsWith('JOY:')) {
                    const rtt = performance.now() - jsPendingTime;
                    jsPendingTime = null;
                    updateLatencyDisplay(rtt);
                }
                if (jsPendingTime && response.status === 'SUCCESS') {
                    const rtt = performance.now() - jsPendingTime;
                    jsPendingTime = null;
                    updateLatencyDisplay(rtt);
                }
                _prevProcessResponse(response);
            };

            // 绑定事件 - 鼠标
            area.addEventListener('mousedown', startDrag);
            document.addEventListener('mousemove', moveDrag);
            document.addEventListener('mouseup', endDrag);

            // 绑定事件 - 触摸
            area.addEventListener('touchstart', startDrag, { passive: false });
            document.addEventListener('touchmove', moveDrag, { passive: false });
            document.addEventListener('touchend', endDrag);
        })();

        // 初始化日志
        logMessage('ESP32无线编程器已就绪', 'info');
        logMessage('支持蓝牙(BLE)和USB串口两种连接方式', 'info');
        logMessage('点击"扫描并连接设备"开始使用', 'info');
        
    </script>
</body>
</html>
